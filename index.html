<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyburger Company - Arma 3 Unit</title>
  <link rel="icon" href="SKYBURGER_Deluxe_Embroidery_No_Text_2.png" type="image/png" />

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 196, 0, 0.08), transparent 30%),
        linear-gradient(180deg, #0b0b0b 0%, #111111 45%, #0a0a0a 100%);
      color: #f4f4f4;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .site-shell {
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 88vh;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
    }

    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    .hero-slide.active {
      opacity: 1;
    }

    .hero-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.55);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.55), rgba(10,10,10,0.95));
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: min(1200px, calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 40px;
      align-items: center;
      padding: 60px 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 196, 0, 0.1);
      border: 1px solid rgba(255, 196, 0, 0.28);
      color: #ffe082;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.92rem;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    .pill-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffcc00;
      box-shadow: 0 0 12px rgba(255, 204, 0, 0.7);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand-logo-wrap {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.8rem;
      color: #ffd54f;
      margin-bottom: 8px;
    }

    .hero h1 {
      font-size: clamp(2.4rem, 5vw, 4.9rem);
      line-height: 0.98;
      margin: 0 0 18px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .hero p.lead {
      font-size: 1.12rem;
      color: #e0e0e0;
      max-width: 720px;
      margin: 0 0 28px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 700;
      transition: 0.22s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd54f, #ffb300);
      color: #111;
      box-shadow: 0 12px 30px rgba(255, 193, 7, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      color: #fff;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .hero-card h3 {
      margin-top: 0;
      font-size: 1.35rem;
      margin-bottom: 10px;
      color: #ffd54f;
    }

    .hero-card ul {
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
      display: grid;
      gap: 12px;
    }

    .hero-card li {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dddddd;
    }

    .hero-card li strong {
      color: #fff1a8;
    }

    .section {
      width: min(1200px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0;
    }

    .section-header {
      max-width: 760px;
      margin-bottom: 36px;
    }

    .section-header .eyebrow {
      margin-bottom: 12px;
    }

    .section-header h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 3vw, 3.2rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .section-header p {
      margin: 0;
      color: #cfcfcf;
      font-size: 1.03rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
    }

    .card p {
      color: #d1d1d1;
      margin-top: 0;
    }

    .founded-box {
      background:
        linear-gradient(180deg, rgba(255, 204, 0, 0.12), rgba(255,255,255,0.03));
      border: 1px solid rgba(255, 204, 0, 0.18);
    }

    .stat-label {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ffd54f;
      font-size: 0.8rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .stat-number {
      font-size: 2.7rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .value-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .value-item {
      background: rgba(0,0,0,0.26);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 14px;
      border-radius: 14px;
      color: #e4e4e4;
    }

    .offer-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .offer-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      transition: 0.2s ease;
      box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    }

    .offer-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 204, 0, 0.28);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .offer-card h3 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      color: #ffd54f;
    }

    .offer-card p {
      margin: 0;
      color: #d5d5d5;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .step-card {
      padding: 28px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    }

    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(135deg, #ffd54f, #ffb300);
      color: #111;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .step-card h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .step-card p {
      margin: 0;
      color: #d0d0d0;
    }

    .video-section {
      background: rgba(255,255,255,0.025);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .video-card {
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #000;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
    }

    .cta-box {
      background:
        linear-gradient(135deg, rgba(255, 204, 0, 0.14), rgba(255,255,255,0.035), rgba(255, 204, 0, 0.06));
      border: 1px solid rgba(255, 204, 0, 0.16);
      border-radius: 32px;
      padding: 42px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    }

    .cta-box h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .cta-box p {
      margin: 0 0 24px;
      color: #d2d2d2;
      max-width: 700px;
      font-size: 1.05rem;
    }

    footer {
      padding: 28px 20px 40px;
      text-align: center;
      color: #9f9f9f;
      font-size: 0.95rem;
    }

    @media (max-width: 1000px) {
      .hero-content,
      .grid-2,
      .offer-grid,
      .steps-grid,
      .video-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
      }

      .hero-content {
        padding: 90px 0 70px;
      }
    }

    @media (max-width: 640px) {
      .section {
        padding: 70px 0;
      }

      .hero-content {
        width: min(1200px, calc(100% - 24px));
      }

      .section {
        width: min(1200px, calc(100% - 24px));
      }

      .card,
      .hero-card,
      .cta-box,
      .offer-card,
      .step-card {
        padding: 22px;
      }

      .brand-row {
        align-items: flex-start;
      }

      .brand-logo-wrap {
        width: 76px;
        height: 76px;
      }

      .hero h1 {
        font-size: 2.3rem;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function App() {
      const banners = [
        "SBWeb.png",
        "SBWeb2.png",
        "SBWeb3.png",
        "SBWeb4.png",
        "SBWeb5.png",
        "SBWeb6.png",
        "SBWeb7.png"
      ];

      const videos = [
        "https://www.youtube.com/embed/50ESyskOw4Y?si=PUVMdAW88Oo5XPjK",
        "https://www.youtube.com/embed/sA-mZTH2KSw?si=zfXsXR1UlFdNrvaj",
        "https://www.youtube.com/embed/8kRHTdUA1nk?si=jnAhdraDcY01L9GP",
        "https://www.youtube.com/embed/4rIJpPzYKEE?si=4a01TTtQns0UuMod"
      ];

      const offerings = [
        {
          title: "Flexible Operations",
          text: "Our zeuses set operation times, usually starting around 7 PM CST, with the number of ops varying week to week."
        },
        {
          title: "Diverse Gameplay",
          text: "No restrictions on time periods or factions. One week you might be fighting as NATO, and the next as a rebel militia."
        },
        {
          title: "Custom Modpack",
          text: "A robust mod collection, including RHS, built to deliver immersive experiences and varied mission styles."
        },
        {
          title: "Dedicated Server & TFAR",
          text: "We provide a reliable server setup and use TFAR for stronger immersion and communication during ops."
        },
        {
          title: "Inclusive Community",
          text: "LGBTQ+ friendly and welcoming to players of all experience levels, whether you are brand new or battle-hardened."
        },
        {
          title: "Role Freedom",
          text: "Anyone can sign up for any role mission by mission, so long as they understand how to perform that role's duties."
        }
      ];

      const steps = [
        {
          number: "01",
          title: "Join the Discord",
          text: "Start by hopping into the Discord and getting connected with the community."
        },
        {
          number: "02",
          title: "Complete Probation",
          text: "Your first two missions are probationary so you can learn names, voices, and how the group operates."
        },
        {
          number: "03",
          title: "Play Your Way",
          text: "After probation, you gain full access to roles and channels and can jump into the full Skyburger experience."
        }
      ];

      const [currentBanner, setCurrentBanner] = useState(0);

      useEffect(() => {
        const interval = setInterval(() => {
          setCurrentBanner(prev => (prev + 1) % banners.length);
        }, 3500);

        return () => clearInterval(interval);
      }, []);

      return (
        <div className="site-shell">
          <header className="hero">
            {banners.map((banner, index) => (
              <div
                key={banner}
                className={`hero-slide ${index === currentBanner ? "active" : ""}`}
              >
                <img src={banner} alt={`Skyburger banner ${index + 1}`} />
              </div>
            ))}

            <div className="hero-overlay"></div>

            <div className="hero-content">
              <div>
                <div className="pill">
                  <span className="pill-dot"></span>
                  Semi-casual Arma 3 unit · fun, freedom, and organized chaos
                </div>

                <div className="brand-row">
                  <div className="brand-logo-wrap">
                    <img
                      src="SKYBURGER_Deluxe_Embroidery_No_Text_2.png"
                      alt="Skyburger Logo"
                    />
                  </div>
                  <div>
                    <div className="eyebrow">Skyburger Company</div>
                    <h1>Arma without the rank obsession.</h1>
                  </div>
                </div>

                <p className="lead">
                  Tired of mandatory attendance, rigid roles, and taking everything too seriously?
                  Skyburger blends fun and organization so you can enjoy varied ops, good people,
                  and memorable missions without the usual baggage.
                </p>

                <div className="hero-actions">
                  <a
                    className="btn btn-primary"
                    href="https://discord.gg/uZZyB5V7k9"
                    target="_blank"
                    rel="noreferrer"
                  >
                    Join Our Discord
                  </a>
                  <a className="btn btn-secondary" href="#videos">
                    Watch Member Videos
                  </a>
                </div>
              </div>

              <div className="hero-card">
                <h3>Why people join</h3>
                <p>
                  Skyburger is built for players who want structure when it matters and freedom when it counts.
                </p>
                <ul>
                  <li><strong>No mandatory attendance</strong> — show up when you can.</li>
                  <li><strong>No locked-in role</strong> — play different jobs mission by mission.</li>
                  <li><strong>Short probation period</strong> — learn the group before taking on more.</li>
                  <li><strong>Good community culture</strong> — fun is welcome, griefing is not.</li>
                </ul>
              </div>
            </div>
          </header>

          <section className="section">
            <div className="grid-2">
              <div className="card">
                <div className="section-header" style={{marginBottom: "0"}}>
                  <div className="eyebrow">Welcome to Skyburger</div>
                  <h2>A unit built for people who actually want to enjoy Arma.</h2>
                </div>

                <p>
                  Are you tired of ranks? Fed up with mandatory attendance? Would you like to do more than the same job every time? Welcome to Skyburger.
                </p>
                <p>
                  We are a semi-casual Arma 3 unit, blending fun and organization. While we encourage a certain level of decorum, we also welcome shenanigans — just make sure they do not disrupt others' experiences.
                </p>
                <p>
                  Anyone can sign up for any role, mission by mission. All we ask is that you know how to perform the role's duties. You will be placed on probation for your first two missions, during which you will observe how we operate.
                </p>
                <p>
                  During probation, you cannot take on leadership positions and are expected to learn names and voices while gauging our playstyle. Once probation ends, you gain full access to roles and channels.
                </p>
                <p style={{marginBottom: 0}}>
                  Remember, we are here to have fun. If you think twice about doing something “funny,” it is probably best not to do it.
                </p>
              </div>

              <div className="card founded-box">
                <div className="stat-label">Founded</div>
                <div className="stat-number">August 2021</div>
                <p>
                  Skyburger Company is a welcoming community that is LGBTQ+ friendly and open to players of all experience levels.
                </p>
                <div className="value-list">
                  <div className="value-item">No rigid rank culture</div>
                  <div className="value-item">Welcoming to new players</div>
                  <div className="value-item">Flexible, mission-based roles</div>
                  <div className="value-item">Respectful and fun environment</div>
                </div>
              </div>
            </div>
          </section>

          <section className="section">
            <div className="section-header">
              <div className="eyebrow">What we offer</div>
              <h2>Everything needed for a great op, without the nonsense.</h2>
              <p>
                The goal is simple: make Arma fun, immersive, and flexible while still keeping operations organized.
              </p>
            </div>

            <div className="offer-grid">
              {offerings.map((item) => (
                <div className="offer-card" key={item.title}>
                  <h3>{item.title}</h3>
                  <p>{item.text}</p>
                </div>
              ))}
            </div>
          </section>

          <section className="section">
            <div className="section-header">
              <div className="eyebrow">How joining works</div>
              <h2>Easy to join. Easy to learn. Easy to stay.</h2>
              <p>
                New members are given time to learn the group before stepping into more responsibility.
              </p>
            </div>

            <div className="steps-grid">
              {steps.map((step) => (
                <div className="step-card" key={step.number}>
                  <div className="step-number">{step.number}</div>
                  <h3>{step.title}</h3>
                  <p>{step.text}</p>
                </div>
              ))}
            </div>
          </section>

          <section className="video-section" id="videos">
            <div className="section">
              <div className="section-header">
                <div className="eyebrow">Member videos</div>
                <h2>See Skyburger in action.</h2>
                <p>
                  Watch footage from members and get a feel for the style, pacing, and atmosphere of our ops.
                </p>
              </div>

              <div className="video-grid">
                {videos.map((video, index) => (
                  <div className="video-card" key={index}>
                    <iframe
                      className="video-frame"
                      src={video}
                      title={`Skyburger video ${index + 1}`}
                      allowFullScreen
                    ></iframe>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="section">
            <div className="cta-box">
              <div className="eyebrow">Ready to deploy?</div>
              <h2>Join Skyburger Company.</h2>
              <p>
                Whether you are an Arma veteran or just getting started, there is a place for you here.
                Join the Discord, meet the group, and see if Skyburger is the right fit.
              </p>
              <a
                className="btn btn-primary"
                href="https://discord.gg/uZZyB5V7k9"
                target="_blank"
                rel="noreferrer"
              >
                Join the Discord
              </a>
            </div>
          </section>

          <footer>
            <p>&copy; 2026 Skyburger Company. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
